<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>上新莊分行 - FCN 管理系統 v58.FinalLogic</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [v-cloak] { display: none; }
        body { background-color: #f3f4f6; color: #1e293b; font-family: -apple-system, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif; -webkit-font-smoothing: antialiased; }
        .fcn-card { background: white; border-radius: 28px; padding: 24px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #eee; position: relative; }
        .stock-tag { background: #f8fafc; border: 1.5px solid #edf2f7; border-radius: 14px; padding: 10px 4px; text-align: center; flex: 1; min-width: 105px; position: relative; }

        /* 視覺標記樣式 */
        .stock-tag.ki-hit { border: 2px solid #ef4444; background-color: #fef2f2; } /* 紅色 KI */
        .stock-tag.ko-hit { border: 2px solid #3b82f6; background-color: #eff6ff; } /* 藍色 KO */

        .nav-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 8px; border-radius: 40px; display: flex; gap: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; overflow-x: auto; scrollbar-width: none; }
        .nav-btn { padding: 12px 20px; border-radius: 30px; font-weight: 800; color: #64748b; transition: 0.2s; white-space: nowrap; font-size: 17px; cursor: pointer; }
        .nav-btn.active { background: #1f2937; color: white; }
        .risk-tab { padding: 16px 18px; font-weight: 800; color: #94a3b8; border-bottom: 4px solid transparent; flex: 1; text-align: center; font-size: 16px; white-space: nowrap; cursor: pointer; }
        .risk-tab.active { color: #2563eb; border-bottom-color: #2563eb; background: rgba(37, 99, 235, 0.05); }
        .lock-badge { background: #fffbeb; color: #b45309; border: 1px solid #fef3c7; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
        .text-success { color: #10b981; font-weight: 900; }
        .text-danger { color: #ef4444; font-weight: 900; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .jpy-tag { color: #64748b; background: #f1f5f9; padding: 2px 6px; border-radius: 6px; font-weight: 900; }
        .usd-tag { color: #2563eb; background: #eff6ff; padding: 2px 6px; border-radius: 6px; font-weight: 900; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div id="app" v-cloak class="max-w-4xl mx-auto">
        <div v-if="!isLoggedIn" class="fixed inset-0 bg-slate-900 z-[2000] flex items-center justify-center p-6">
            <div class="bg-white rounded-[2.5rem] p-10 w-full max-w-sm text-center shadow-2xl">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white mx-auto mb-6"><i class="fa-solid fa-lock text-2xl"></i></div>
                <h2 class="text-2xl font-black mb-2 italic">上新莊管理系統</h2>
                <input v-model="inputPass" type="password" @keyup.enter="login" placeholder="Password" class="w-full bg-slate-100 border-none p-4 rounded-2xl text-center text-3xl tracking-[0.4em] mb-6 outline-none focus:ring-2 ring-blue-500 font-mono">
                <button @click="login" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black text-lg">LOGIN</button>
            </div>
        </div>

        <template v-if="isLoggedIn">
            <div class="nav-header sticky top-4 z-[1000] scrollbar-hide text-slate-800">
                <button @click="view = 'branch'" :class="['nav-btn', view === 'branch' ? 'active' : '']">資產管理</button>
                <button @click="view = 'client'" :class="['nav-btn', view === 'client' ? 'active' : '']">按客戶</button>
                <button @click="view = 'sales'" :class="['nav-btn', view === 'sales' ? 'active' : '']">按業務員</button>
                <button @click="view = 'alerts'" :class="['nav-btn', view === 'alerts' ? 'active' : '']">預警中心</button>
                <button @click="view = 'entry'" :class="['nav-btn', view === 'entry' ? 'active' : '']">資料輸入</button>
                <button @click="runPriceSchedule" :disabled="isUploading" class="nav-btn text-orange-600"><i class="fa-solid fa-cloud-arrow-down mr-1"></i>報價排程</button>
                <div class="ml-auto flex items-center pr-3">
                    <i @click="fetchRealPrices" class="fa-solid fa-rotate text-blue-500 cursor-pointer text-lg" :class="{'animate-spin': isSyncing}"></i>
                </div>
            </div>

            <div class="px-4 mb-4 flex justify-between items-center gap-2 flex-wrap text-sm font-black tracking-wide text-gray-400 uppercase">
                <span class="flex items-center gap-1"><i class="fa-solid fa-circle text-[6px] text-green-500"></i> FCN Iron-Shield System</span>
                <span v-if="lastUpdated">Refreshed: {{ lastUpdated }}</span>
            </div>

            <div v-if="view === 'alerts'" class="space-y-4 fade-in">
                <div class="flex bg-white rounded-2xl shadow-sm mb-4 overflow-x-auto text-slate-800 scrollbar-hide border border-gray-100">
                    <button @click="alertTab = 'ki'" :class="['risk-tab', alertTab === 'ki' ? 'active' : '']">觸及KI({{kiList.length}})</button>
                    <button @click="alertTab = 'obs'" :class="['risk-tab', alertTab === 'obs' ? 'active' : '']">即將觀察({{observationList.length}})</button>
                    <button @click="alertTab = 'pko'" :class="['risk-tab', alertTab === 'pko' ? 'active' : '']">曾經KO({{partKOList.length}})</button>
                    <button @click="alertTab = 'nko'" :class="['risk-tab', alertTab === 'nko' ? 'active' : '']">即將KO({{nearKOList.length}})</button>
                    <button @click="alertTab = 'exp'" :class="['risk-tab', alertTab === 'exp' ? 'active' : '']">到期({{expiringList.length}})</button>
                    <button @click="alertTab = 'dlv'" :class="['risk-tab', alertTab === 'dlv' ? 'active' : '']">到期接股({{deliveryList.length}})</button>
                    <button @click="alertTab = 'exit'" :class="['risk-tab', alertTab === 'exit' ? 'active' : '']">已出場({{exitList.length}})</button>
                </div>
                <div class="space-y-4">
                    <client-card v-for="item in currentAlertList" :item="item" :key="item.sn + item.client"></client-card>
                    <div v-if="currentAlertList.length === 0" class="text-center py-20 text-gray-300 font-bold italic uppercase text-xs tracking-widest">No Matches Found</div>
                </div>
            </div>

            <div v-if="view === 'branch'" class="space-y-4 fade-in">
                <h2 class="text-xl font-black px-2 italic uppercase text-slate-800 text-left tracking-tighter">Portfolio Summary</h2>

                <div class="fcn-card shadow-xl text-white border-none bg-gradient-to-br from-emerald-600 to-teal-700">
                    <div class="flex justify-between items-start mb-3 text-white">
                        <div>
                            <div class="text-lg font-black tracking-wide">總部位 · 台幣計價</div>
                            <div class="text-xs font-bold opacity-75 mt-1">美金＋日幣　即時匯率 {{ fxRateLabel }}<span v-if="!fx.ok" class="ml-1">（估算）</span></div>
                        </div>
                        <span class="text-sm font-black opacity-80 mt-1 whitespace-nowrap">{{ countUSD + countJPY }}筆</span>
                    </div>
                    <div class="text-5xl font-black italic font-mono tracking-tighter text-white">NT$ {{ formatNum(totalTWD) }} <span class="text-lg font-normal opacity-60 uppercase">萬</span></div>
                </div>

                <div class="fcn-card shadow-xl text-white border-none bg-blue-600">
                    <div class="flex justify-between items-start mb-3 text-white">
                        <div class="text-lg font-black tracking-wide">美金部位 · 美金計價</div>
                        <span class="text-sm font-black opacity-80 whitespace-nowrap">{{ countUSD }}筆</span>
                    </div>
                    <div class="text-5xl font-black italic font-mono tracking-tighter text-white">$ {{ formatNum(totalUSD) }} <span class="text-lg font-normal opacity-50 uppercase">萬</span></div>
                </div>

                <div class="fcn-card shadow-xl text-white border-none bg-slate-800">
                    <div class="flex justify-between items-start mb-3 text-white">
                        <div class="text-lg font-black tracking-wide">日幣部位 · 日幣計價</div>
                        <span class="text-sm font-black opacity-80 whitespace-nowrap">{{ countJPY }}筆</span>
                    </div>
                    <div class="text-5xl font-black italic font-mono tracking-tighter text-white">¥ {{ formatNum(totalJPY) }} <span class="text-lg font-normal opacity-50 uppercase">萬</span></div>
                </div>
            </div>
            <div v-if="view === 'client'" class="space-y-4 fade-in">
                <div class="flex items-center gap-3 flex-wrap">
                    <select v-model="selectedClient" class="flex-1 min-w-[200px] p-4 rounded-3xl bg-white shadow-sm font-black text-blue-600 outline-none text-lg">
                        <option value="">— 選擇客戶 —</option>
                        <option v-for="c in clientNames" :key="c" :value="c">{{ c }}</option>
                    </select>
                    <button @click="exportSelectedClient" class="bg-emerald-600 text-white font-black rounded-2xl px-6 py-4 text-base whitespace-nowrap shadow-sm"><i class="fa-solid fa-table-list mr-2"></i>匯出客戶總表</button>
                </div>
                <input v-model="search" type="text" placeholder="🔍 Search Client or SN..." class="w-full p-4 rounded-3xl bg-white shadow-sm font-bold outline-none text-slate-800 pl-6">
                <div v-for="grp in clientGroups" :key="grp.name" class="space-y-4">
                    <div class="flex justify-between items-center gap-3 flex-wrap bg-white rounded-2xl shadow-sm px-5 py-3 border border-gray-100">
                        <h2 class="text-2xl font-black text-slate-800">{{ grp.name }} <span class="text-base text-gray-400 font-bold ml-1">· {{ grp.items.length }} 檔</span></h2>
                        <button @click="exportClientReport(grp.name)" class="bg-emerald-600 text-white font-black rounded-xl px-5 py-2.5 text-base whitespace-nowrap shadow-sm"><i class="fa-solid fa-table-list mr-2"></i>匯出客戶總表</button>
                    </div>
                    <client-card v-for="item in grp.items" :item="item" :key="item.sn + item.client"></client-card>
                </div>
            </div>
            <div v-if="view === 'sales'" class="space-y-4 fade-in text-slate-800 text-left"><select v-model="selectedSales" class="w-full p-4 rounded-3xl bg-white shadow-sm font-black text-blue-600 outline-none text-lg text-slate-800 font-mono"><option v-for="s in salesSummary" :value="s.name">{{ s.name }} ({{ s.count }} 筆)</option></select><client-card v-for="item in salesFilteredList" :item="item" :key="item.sn + item.client"></client-card></div>

            <div v-if="view === 'entry'" class="space-y-4 fade-in text-slate-800 text-left">
                <div class="fcn-card">
                    <h2 class="text-xl font-black italic mb-4">{{ editIndex===null ? '➕ 新增部位' : '✏️ 編輯部位' }}</h2>
                    <div class="grid grid-cols-2 gap-3 text-sm">
                        <label class="block font-bold text-gray-500">客戶<input v-model="form.client" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                        <label class="block font-bold text-gray-500">SN<input v-model="form.sn" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                        <label class="block font-bold text-gray-500">業務員<input v-model="form.sales" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                        <label class="block font-bold text-gray-500">幣別<select v-model="form.currency" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"><option>USD</option><option>JPY</option></select></label>
                        <label class="block font-bold text-gray-500">票息 %<input type="number" step="0.01" v-model.number="form.coupon" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                        <label class="block font-bold text-gray-500">庫存金額(萬)<input type="number" v-model.number="form.amount" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                        <label class="block font-bold text-gray-500">KO %<input type="number" step="0.01" v-model.number="form.koP" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                        <label class="block font-bold text-gray-500">KI %<input type="number" step="0.01" v-model.number="form.kiP" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                        <label class="block font-bold text-gray-500">Strike%<input type="number" step="0.01" v-model.number="form.strikeP" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                        <label class="block font-bold text-gray-500">觀察起日<input type="date" v-model="form.koStart" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                        <label class="block font-bold text-gray-500">下單日<input type="date" v-model="form.date" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                        <label class="block font-bold text-gray-500">到期日<input type="date" v-model="form.expiry" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                    </div>
                    <h3 class="font-black mt-5 mb-2 text-gray-500 text-sm">標的（最多 5 檔・日股代號記得加 .T，例 7974.T）</h3>
                    <div class="space-y-2">
                        <div v-for="(st,idx) in form.stocks" :key="idx" class="flex gap-2 items-center">
                            <input v-model="st.code" placeholder="代號" class="flex-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-blue-600 uppercase">
                            <input type="number" step="0.01" v-model.number="st.init" placeholder="KO價" class="flex-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800">
                            <button @click="form.stocks.splice(idx,1)" class="text-red-500 font-black px-2">✕</button>
                        </div>
                        <button v-if="form.stocks.length<5" @click="form.stocks.push({code:'',init:null})" class="text-blue-600 font-black text-sm">＋ 加一檔標的</button>
                    </div>
                    <div class="flex gap-2 mt-6">
                        <button @click="submitEntry" class="flex-1 bg-slate-900 text-white p-3.5 rounded-2xl font-black">{{ editIndex===null ? '新增到列表' : '更新' }}</button>
                        <button v-if="editIndex!==null" @click="resetForm" class="bg-gray-200 text-gray-600 px-6 rounded-2xl font-black">取消</button>
                    </div>
                </div>

                <div class="fcn-card">
                    <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
                        <h3 class="font-black text-slate-800">目前資料（{{ inventory.length }} 筆）<span v-if="dirty" class="text-red-500 text-xs ml-1 align-middle">● 尚未儲存</span></h3>
                        <div class="space-y-3 w-full">
                            <div class="flex gap-3 flex-wrap">
                                <input ref="importInput" type="file" accept=".xlsx,.xls,.csv" @change="importFile" class="hidden">
                                <button @click="triggerImport" class="bg-indigo-600 text-white px-5 py-3 rounded-xl font-black text-base">📥 匯入客戶表</button>
                                <input ref="masterInput" type="file" accept=".xlsx,.xls,.csv" @change="importMaster" class="hidden">
                                <button @click="triggerMaster" class="bg-purple-600 text-white px-5 py-3 rounded-xl font-black text-base">📥 匯入商品主檔(補標的)</button>
                            </div>
                            <div class="flex gap-3 flex-wrap">
                                <button @click="exportBackup" class="bg-emerald-600 text-white px-5 py-3 rounded-xl font-black text-base">📦 匯出備份檔</button>
                                <input ref="backupInput" type="file" accept=".xlsx,.xls,.csv" @change="importBackup" class="hidden">
                                <button @click="triggerBackup" class="bg-cyan-600 text-white px-5 py-3 rounded-xl font-black text-base">📂 匯入備份檔</button>
                            </div>
                            <div class="flex gap-3 items-center flex-wrap">
                                <input v-model="githubToken" type="password" placeholder="GitHub Token" class="text-sm bg-gray-100 p-3 rounded-lg w-44 font-mono outline-none">
                                <button @click="saveAllToGithub" :disabled="isUploading" :class="['px-5 py-3 rounded-xl font-black text-base text-white', dirty ? 'bg-blue-600 animate-pulse' : 'bg-blue-600']">{{ isUploading ? '處理中…' : '💾 儲存到 GitHub' }}</button>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <div v-for="(it,idx) in inventory" :key="idx" class="flex justify-between items-center bg-gray-50 p-3 rounded-2xl">
                            <div class="min-w-0"><b class="text-slate-800">{{ it.client }}</b> <span class="text-[11px] text-gray-400 font-bold">{{ it.sn }} · {{ (it.stocks||[]).map(s=>s.code).join('、') }}</span></div>
                            <div class="flex gap-3 flex-shrink-0">
                                <button @click="editEntry(idx)" class="text-blue-600 text-sm font-black">編輯</button>
                                <button @click="deleteEntry(idx)" class="text-red-500 text-sm font-black">刪除</button>
                            </div>
                        </div>
                        <div v-if="inventory.length===0" class="text-center text-gray-300 py-8 font-bold italic text-xs uppercase">No Data</div>
                    </div>
                    <p class="text-[11px] text-gray-400 mt-4 leading-relaxed">＊ 新增/編輯/刪除後，要按上面「💾 儲存到 GitHub」才會永久保存。第一次要貼一次 GitHub Token（會記在這台裝置）。</p>
                </div>
            </div>

        </template>
    </div>

    <script>
        const { createApp } = Vue
        const stockNames = {'6146.T':'Disco','6501.T':'日立','7011.T':'三菱重工','6857.T':'愛德萬','7012.T':'川崎重工','7013.T':'IHI重工','7974.T':'任天堂','8035.T':'東京威力','5803.T':'藤倉電子','8697.T':'日本交易所','8002.T':'丸紅','NVDA':'輝達','TSLA':'特斯拉','TSM':'台積電','AMD':'超微','MU':'美光','ARM':'安謀','GOOG':'谷歌','AMZN':'亞馬遜','AVGO':'博通','MSFT':'微軟','META':'臉書','DELL':'戴爾','ORCL':'甲骨文','OKLO':'Oklo','PLTR':'帕蘭提爾','NFLX':'網飛','BRK.B':'波克夏'};

        const ClientCard = {
            props: ['item'],
            template: `
                <div class="fcn-card fade-in text-slate-800 border border-gray-100 shadow-sm text-left">
                    <div v-if="isLocked(item)" class="absolute right-6 top-6"><span class="lock-badge" style="font-size:15px;padding:6px 14px"><i class="fa-solid fa-lock mr-1"></i>保證鎖定期</span></div>
                    <div class="flex justify-between items-start mb-7 gap-3 flex-wrap">
                        <div>
                            <div class="flex items-center gap-3">
                                <h3 class="text-4xl font-black text-gray-900 leading-none">{{ item.client }}</h3>
                                <button @click="printCard" title="列印橫式報告" style="background:rgba(15,39,72,0.10);color:#0f2748;border:1px solid rgba(15,39,72,0.20);padding:5px 13px;border-radius:9999px;font-size:14px;font-weight:800;backdrop-filter:blur(2px);white-space:nowrap"><i class="fa-solid fa-print mr-1"></i>列印</button>
                            </div>
                            <div class="flex items-center gap-2 mt-3 font-bold text-lg text-gray-500">{{ item.sn }} <span :class="[item.currency === 'JPY' ? 'jpy-tag' : 'usd-tag']" style="font-size:16px;padding:3px 10px">{{ item.currency }}</span></div>
                        </div>
                        <div class="text-right">
                            <div class="bg-indigo-50 text-indigo-700 rounded-xl font-black" style="font-size:19px;padding:8px 16px">票息 {{ item.coupon }}%</div>
                            <div class="text-lg text-gray-500 font-bold mt-2">業務：{{ item.sales }}</div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-7">
                        <div v-for="s in (item.stocks || [])" :key="s.code" class="stock-tag" :class="getStockClass(item, s)" style="padding:16px 12px;min-width:0">
                            <div v-if="isStockKI(item, s)" class="absolute -top-3.5 left-1/2 -translate-x-1/2 bg-red-600 text-white px-4 py-1 rounded-full font-black shadow z-10 whitespace-nowrap" style="font-size:15px">⚠ 觸及KI</div>
                            <div v-else-if="isStockKO(item, s)" class="absolute -top-3.5 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-4 py-1 rounded-full font-black shadow z-10 whitespace-nowrap" style="font-size:15px">★ 曾達KO</div>

                            <p class="text-3xl font-black text-blue-600 leading-tight mt-1">{{ s.code.replace('.T', '') }}</p>
                            <p class="text-lg font-bold text-gray-400 mb-1">{{ getStockName(s.code) }}</p>
                            <p class="font-black leading-none my-2 text-slate-900" style="font-size:40px">{{ formatPrice(s.current) }}</p>
                            <div class="font-bold text-gray-500 border-t-2 border-gray-200 pt-2 mt-1 space-y-1" style="font-size:17px">
                                <p>KO價：<span class="text-slate-900 font-black">{{ formatPrice(s.init) }}</span></p>
                                <p>Strike價：<span class="text-slate-900 font-black">{{ item.strikeP > 0 ? formatPrice(s.init * (item.strikeP/100)) : '無' }}</span></p>
                                <p>KI價：<span class="text-slate-900 font-black">{{ item.kiP > 0 ? formatPrice(s.init * (item.kiP/100)) : '無' }}</span></p>
                            </div>
                            <p class="text-3xl font-black mt-2" :class="perfColor(item, s)">{{ getPerf(item, s) }}%</p>
                            <p v-if="koHitLabel(item, s)" class="font-black text-blue-800 bg-blue-100 rounded-lg px-2 py-1.5 mt-2 leading-snug" style="font-size:15px">達KO：{{ koHitLabel(item, s) }}</p>
                            <p v-if="kiHitLabel(item, s)" class="font-black text-red-800 bg-red-100 rounded-lg px-2 py-1.5 mt-2 leading-snug" style="font-size:15px">觸KI：{{ kiHitLabel(item, s) }}</p>
                        </div>
                    </div>
                    <div v-if="willTakeDelivery(item)" class="bg-red-600 text-white rounded-2xl px-5 py-4 mb-6 font-black shadow-lg" style="font-size:20px">
                        ⚠ 到期恐接股：{{ deliveryLabel(item) }}
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 border-t-2 border-gray-200 pt-6 mb-5 font-bold text-gray-600" style="font-size:19px">
                        <div class="space-y-2">
                            <p>下單日期：<span class="text-slate-900 font-black">{{ item.date || '---' }}</span></p>
                            <p>庫存金額：<span class="text-slate-900 font-black">{{ (!item.amount) ? '交割中' : formatNum(item.amount) + ' 萬' }}</span></p>
                            <p>到期日期：<span class="text-blue-600 font-black">{{ item.expiry }}</span></p>
                        </div>
                        <div class="sm:text-right space-y-2">
                            <p>月利率：{{ (item.coupon/12).toFixed(4) }}%</p>
                            <p>預估月息：<span class="text-emerald-600 font-black" style="font-size:30px">{{ item.currency==='JPY'?'¥':'$' }}{{ formatNum(calcMonthly(item)) }}</span></p>
                        </div>
                    </div>
                    <div class="flex flex-wrap justify-between items-center gap-x-5 gap-y-2 font-black bg-gray-50 p-4 rounded-2xl text-gray-500" style="font-size:17px">
                        <span>KO <span class="text-slate-900">{{ item.koP }}%</span></span><span>Strike <span class="text-slate-900">{{ item.strikeP }}%</span></span><span :class="{'text-danger underline': hasBreachedKI(item)}">KI {{ item.kiP }}%</span><span>觀察起 <span class="text-slate-900">{{ item.koStart }}</span></span>
                    </div>
                </div>
            `,
            methods: {
                formatNum(n){ return n ? Math.floor(n).toLocaleString() : '0'; },
                formatPrice(n){
                    if (!n || n == 0) return '---';
                    return (Math.floor(parseFloat(n) * 100) / 100).toFixed(2);
                },
                calcMonthly(i){ return ((i.amount||0) * 10000 * (i.coupon/100)) / 12; },
                getStockName(c){ return stockNames[c] || c; },
                _fmtDate(ts){ const d = new Date(ts * 1000); return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`; },
                koHitInfo(i, s){
                    const ko = s.init;  // KO價（直接）
                    if (s.history && s.history.timestamp) {
                        const start = this.parseDate(i.koStart).getTime() / 1000;
                        const arr = s.history.close || s.history.high;
                        for (let j = 0; j < s.history.timestamp.length; j++) {
                            if (s.history.timestamp[j] >= start && arr[j] != null && arr[j] >= ko) {
                                return { date: this._fmtDate(s.history.timestamp[j]), close: arr[j] };
                            }
                        }
                    }
                    if (s.current != null && s.current >= ko) return { date: '今日', close: s.current };
                    return null;
                },
                koHitLabel(i, s){ if (!this.isStockKO(i, s)) return ''; const k = this.koHitInfo(i, s); return k ? `${k.date}・收 ${this.formatPrice(k.close)}` : ''; },
                kiHitInfo(i, s){
                    if (!(i.kiP > 0)) return null;
                    const ki = s.init * i.kiP / 100;  // KI價
                    if (s.history && s.history.timestamp) {
                        const start = this.parseDate(i.koStart || i.date).getTime() / 1000;
                        const arr = s.history.close || s.history.low;
                        for (let j = 0; j < s.history.timestamp.length; j++) {
                            if (s.history.timestamp[j] >= start && arr[j] != null && arr[j] <= ki) {
                                return { date: this._fmtDate(s.history.timestamp[j]), close: arr[j] };
                            }
                        }
                    }
                    if (s.current != null && s.current <= ki) return { date: '今日', close: s.current };
                    return null;
                },
                kiHitLabel(i, s){ if (!this.isStockKI(i, s)) return ''; const k = this.kiHitInfo(i, s); return k ? `${k.date}・收 ${this.formatPrice(k.close)}` : ''; },
                getPerf(i,s){
                    if (!s.init || !s.current || s.current <= 0) return '100.00';
                    return ((s.current/s.init)*100).toFixed(2);
                },
                perfColor(i,s){
                    if (!s.current || s.current <= 0) return 'text-gray-300';
                    const p = parseFloat(this.getPerf(i,s));
                    if(p >= 100) return 'text-success';
                    if(p <= i.kiP) return 'text-danger';
                    return 'text-gray-400';
                },
                hasBreachedKI(i) {
                    if (!i.stocks || i.kiP <= 0) return false;
                    const dateLimit = this.parseDate(i.koStart || i.date);
                    return i.stocks.some(s => {
                        const lowest = this.getLowestSince(s, dateLimit);
                        return lowest > 0 && lowest <= (s.init * i.kiP / 100);
                    });
                },
                // 到期接股：整檔沒有 KO 出場，但曾觸及 KI → 到期用 Strike 接最差的標的
                isKOExited(i) {
                    if (this.checkIsLocked(i)) return false;
                    const st = i.stocks || [];
                    if (!st.length) return false;
                    const start = this.parseDate(i.koStart);
                    return st.every(s => this.getHighestSince(s, start) >= s.init);
                },
                willTakeDelivery(i) {
                    return i.kiP > 0 && this.hasBreachedKI(i) && !this.isKOExited(i);
                },
                deliveryInfo(i) {
                    const st = (i.stocks || []).filter(s => s.init && s.current);
                    if (!st.length) return null;
                    let worst = st[0];
                    st.forEach(s => { if ((s.current / s.init) < (worst.current / worst.init)) worst = s; });
                    return { code: worst.code.replace('.T', ''), perf: ((worst.current / worst.init) * 100).toFixed(2), strike: worst.init * (i.strikeP / 100) };
                },
                deliveryLabel(i) {
                    const d = this.deliveryInfo(i);
                    if (!d) return '';
                    return `${d.code}（最差 ${d.perf}%）· Strike 接股價 ${this.formatPrice(d.strike)}`;
                },
                // === 列印：橫式報告（近6個月走勢 + KO/Strike/KI 線 + 下單日紅點）===
                closeNear(s, tsSec) {
                    const h = s.history || {}; const arr = h.close || h.high || []; const t = h.timestamp || [];
                    let best = null, bd = Infinity;
                    for (let j = 0; j < t.length; j++) { const c = arr[j]; if (c == null) continue; const d = Math.abs(t[j] - tsSec); if (d < bd) { bd = d; best = c; } }
                    return best;
                },
                chartSVG(i, s) {
                    const W = 720, H = 250, padL = 54, padR = 74, padT = 18, padB = 54;
                    const hist = s.history || {};
                    const tsArr = hist.timestamp || [], clArr = hist.close || hist.high || [];
                    const nowSec = Math.floor(new Date().getTime() / 1000);
                    const cutoff = nowSec - 183 * 86400;
                    const pts = [];
                    for (let j = 0; j < tsArr.length; j++) {
                        const t = tsArr[j], c = clArr[j];
                        if (t >= cutoff && c != null && c > 0) pts.push({ t, c });
                    }
                    if (pts.length < 2) {
                        return '<div style="display:flex;align-items:center;justify-content:center;height:' + H + 'px;color:#94a3b8;font-weight:700;font-size:14px">走勢資料尚未抓取 — 請先執行「報價排程」</div>';
                    }
                    const ko = s.init;
                    const strike = i.strikeP > 0 ? s.init * i.strikeP / 100 : null;
                    const ki = i.kiP > 0 ? s.init * i.kiP / 100 : null;
                    const barriers = [ko, strike, ki].filter(v => v != null);
                    let vMin = Math.min(...pts.map(p => p.c), ...barriers);
                    let vMax = Math.max(...pts.map(p => p.c), ...barriers);
                    const gap = (vMax - vMin) || 1; vMin -= gap * 0.08; vMax += gap * 0.10;
                    const tMin = pts[0].t, tMax = pts[pts.length - 1].t;
                    const X = t => padL + (t - tMin) / ((tMax - tMin) || 1) * (W - padL - padR);
                    const Y = v => padT + (vMax - v) / ((vMax - vMin) || 1) * (H - padT - padB);
                    const fx = n => n.toFixed(1);
                    const gid = 'g' + s.code.replace(/[^a-zA-Z0-9]/g, '');
                    let line = '', area = 'M' + fx(X(tMin)) + ' ' + fx(H - padB) + ' ';
                    pts.forEach((p, k) => { const xx = fx(X(p.t)), yy = fx(Y(p.c)); line += (k ? 'L' : 'M') + xx + ' ' + yy + ' '; area += 'L' + xx + ' ' + yy + ' '; });
                    area += 'L' + fx(X(tMax)) + ' ' + fx(H - padB) + ' Z';
                    const bl = (v, color, label, dash) => v == null ? '' :
                        '<line x1="' + padL + '" y1="' + fx(Y(v)) + '" x2="' + (W - padR) + '" y2="' + fx(Y(v)) + '" stroke="' + color + '" stroke-width="1.5" ' + (dash ? 'stroke-dasharray="' + dash + '" ' : '') + 'opacity="0.9"/>' +
                        '<text x="' + (W - padR + 7) + '" y="' + fx(Y(v) + 3.5) + '" fill="' + color + '" font-size="11.5" font-weight="800">' + label + '</text>' +
                        '<text x="' + (W - padR + 7) + '" y="' + fx(Y(v) + 15) + '" fill="' + color + '" font-size="10" opacity="0.75">' + this.formatPrice(v) + '</text>';
                    const od = this.parseDate(i.date).getTime() / 1000;
                    let dot = '';
                    if (od >= tMin - 4 * 86400 && od <= tMax) {
                        let best = pts[0]; pts.forEach(p => { if (Math.abs(p.t - od) < Math.abs(best.t - od)) best = p; });
                        const dx = fx(X(best.t)), dy = fx(Y(best.c));
                        dot = '<line x1="' + dx + '" y1="' + dy + '" x2="' + dx + '" y2="' + (padT + 16) + '" stroke="#e11d48" stroke-width="1" stroke-dasharray="2 2" opacity="0.55"/>' +
                            '<circle cx="' + dx + '" cy="' + dy + '" r="10" fill="#e11d48" opacity="0.16"/>' +
                            '<circle cx="' + dx + '" cy="' + dy + '" r="5" fill="#e11d48" stroke="#fff" stroke-width="1.8"/>' +
                            '<text x="' + dx + '" y="' + (padT + 11) + '" text-anchor="middle" fill="#e11d48" font-size="10.5" font-weight="800">下單 ' + this._fmtDate(od) + '</text>';
                    }
                    let grid = '';
                    for (let k = 0; k <= 4; k++) { const v = vMin + (vMax - vMin) * k / 4; const yy = fx(Y(v)); grid += '<line x1="' + padL + '" y1="' + yy + '" x2="' + (W - padR) + '" y2="' + yy + '" stroke="#eef1f5" stroke-width="1"/><text x="' + (padL - 8) + '" y="' + fx(Y(v) + 3.5) + '" text-anchor="end" fill="#94a3b8" font-size="10.5">' + this.formatPrice(v) + '</text>'; }
                    for (let k = 0; k <= 6; k++) { const t = tMin + (tMax - tMin) * k / 6; const d = new Date(t * 1000); grid += '<text x="' + fx(X(t)) + '" y="' + (H - padB + 16) + '" text-anchor="middle" fill="#94a3b8" font-size="10">' + d.getFullYear() + '/' + (d.getMonth() + 1) + '</text>'; }
                    // 觀察起日垂直線 + 底部日期
                    let obsLine = '';
                    const os = i.koStart ? this.parseDate(i.koStart).getTime() / 1000 : null;
                    if (os != null && !isNaN(os)) {
                        const oxRaw = X(os);
                        const ox = oxRaw < padL ? padL : (oxRaw > W - padR ? W - padR : oxRaw);
                        const oxs = ox.toFixed(1);
                        const od2 = new Date(os * 1000);
                        const odStr = od2.getFullYear() + '/' + (od2.getMonth() + 1) + '/' + od2.getDate();
                        const bw = 132, bh = 18;
                        let bc = ox;
                        if (bc - bw / 2 < 2) bc = bw / 2 + 2;
                        if (bc + bw / 2 > W - 2) bc = W - 2 - bw / 2;
                        obsLine = '<line x1="' + oxs + '" y1="' + padT + '" x2="' + oxs + '" y2="' + (H - padB) + '" stroke="#7c3aed" stroke-width="1.6" stroke-dasharray="4 3" opacity="0.9"/>' +
                            '<rect x="' + (bc - bw / 2).toFixed(1) + '" y="' + (H - padB + 22) + '" width="' + bw + '" height="' + bh + '" rx="5" fill="#7c3aed"/>' +
                            '<text x="' + bc.toFixed(1) + '" y="' + (H - padB + 35) + '" text-anchor="middle" fill="#fff" font-size="11" font-weight="800">觀察起日 ' + odStr + '</text>';
                    }
                    // 最高/最低點小字標示
                    let hi = pts[0], lo = pts[0];
                    pts.forEach(p => { if (p.c > hi.c) hi = p; if (p.c < lo.c) lo = p; });
                    const anc = xx => xx > W - padR - 34 ? 'end' : (xx < padL + 34 ? 'start' : 'middle');
                    const hilo =
                        '<circle cx="' + fx(X(hi.t)) + '" cy="' + fx(Y(hi.c)) + '" r="2.4" fill="#0f2748"/>' +
                        '<text x="' + fx(X(hi.t)) + '" y="' + fx(Y(hi.c) - 6) + '" text-anchor="' + anc(X(hi.t)) + '" fill="#334155" font-size="9.5" font-weight="700">最高 ' + this.formatPrice(hi.c) + '</text>' +
                        '<circle cx="' + fx(X(lo.t)) + '" cy="' + fx(Y(lo.c)) + '" r="2.4" fill="#0f2748"/>' +
                        '<text x="' + fx(X(lo.t)) + '" y="' + fx(Y(lo.c) + 13) + '" text-anchor="' + anc(X(lo.t)) + '" fill="#64748b" font-size="9.5" font-weight="700">最低 ' + this.formatPrice(lo.c) + '</text>';
                    const lx = fx(X(tMax)), ly = fx(Y(pts[pts.length - 1].c));
                    return '<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">' +
                        '<defs><linearGradient id="' + gid + '" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2563eb" stop-opacity="0.26"/><stop offset="1" stop-color="#2563eb" stop-opacity="0.01"/></linearGradient></defs>' +
                        grid +
                        '<path d="' + area + '" fill="url(#' + gid + ')"/>' +
                        bl(ko, '#b8935a', 'KO') + bl(strike, '#64748b', 'Strike', '5 3') + bl(ki, '#dc2626', 'KI', '5 3') +
                        '<path d="' + line + '" fill="none" stroke="#1d4ed8" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>' +
                        '<circle cx="' + lx + '" cy="' + ly + '" r="3.6" fill="#1d4ed8" stroke="#fff" stroke-width="1.5"/>' +
                        obsLine + hilo + dot + '</svg>';
                },
                buildPrintHTML(i) {
                    const st = (i.stocks || []).filter(s => s.code);
                    const now = new Date();
                    const dstr = now.getFullYear() + '/' + (now.getMonth() + 1) + '/' + now.getDate();
                    let months = '';
                    try { const d0 = this.parseDate(i.date), d1 = this.parseDate(i.expiry); months = Math.max(0, Math.round((d1 - d0) / (30.44 * 86400000))); } catch (e) { months = ''; }
                    const rows = st.map((s, idx) => {
                        const strike = i.strikeP > 0 ? this.formatPrice(s.init * i.strikeP / 100) : '無';
                        const ki = i.kiP > 0 ? this.formatPrice(s.init * i.kiP / 100) : '無';
                        let badges = '';
                        if (this.isStockKO(i, s)) badges += '<span class="bdg ko">曾達KO</span>';
                        if (this.isStockKI(i, s)) badges += '<span class="bdg ki">曾觸KI</span>';
                        const odClose = this.closeNear(s, this.parseDate(i.date).getTime() / 1000);
                        const odPrice = odClose != null ? this.formatPrice(odClose) : this.formatPrice(s.current);
                        return '<div class="srow"><div class="sinfo">' +
                            '<div class="stag">標的 ' + (idx + 1) + '</div>' +
                            '<div class="scode">' + s.code.replace('.T', '') + badges + '</div>' +
                            '<div class="sname">' + this.getStockName(s.code) + '</div>' +
                            '<table class="sprices">' +
                            '<tr><td>下單日價</td><td class="v">' + odPrice + '</td></tr>' +
                            '<tr><td>KO 出場價</td><td class="v ko">' + this.formatPrice(s.init) + '</td></tr>' +
                            '<tr><td>Strike 履約價</td><td class="v st">' + strike + '</td></tr>' +
                            '<tr><td>KI 下限價</td><td class="v ki">' + ki + '</td></tr>' +
                            '</table></div><div class="schart">' + this.chartSVG(i, s) + '</div></div>';
                    }).join('');
                    return '<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><title>FCN 部位報告 - ' + (i.client || '') + '</title><style>' +
                        '@page{size:A4 landscape;margin:9mm}' +
                        '*{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact}' +
                        'body{font-family:system-ui,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;color:#13294b;margin:0;padding:4px 12px;background:#fff}' +
                        '.hd{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid #0f2748;padding-bottom:10px}' +
                        '.hd .t{font-size:30px;font-weight:900;letter-spacing:2px;color:#0f2748}' +
                        '.hd .t small{display:block;font-size:11px;font-weight:700;letter-spacing:4px;color:#b8935a;margin-top:3px}' +
                        '.hd .meta{text-align:right;font-size:13px;color:#475569;line-height:1.7}.hd .meta b{color:#0f2748}' +
                        '.cond{width:100%;border-collapse:collapse;margin:12px 0 4px;font-size:13.5px}' +
                        '.cond th{background:#0f2748;color:#fff;font-weight:800;padding:8px 6px;border:1px solid #0f2748}' +
                        '.cond td{text-align:center;padding:9px 6px;border:1px solid #d9dee7;font-weight:800}.cond td.hl{color:#1d4ed8}' +
                        '.legend{display:flex;gap:15px;font-size:11px;color:#64748b;font-weight:700;margin:8px 2px 0;justify-content:flex-end;align-items:center}' +
                        '.legend i{display:inline-block;width:16px;height:0;border-top-width:3px;vertical-align:middle;margin-right:4px}' +
                        '.srow{display:flex;gap:14px;align-items:stretch;border:1px solid #e2e8f0;border-radius:10px;padding:12px 14px;margin-top:12px;page-break-inside:avoid}' +
                        '.sinfo{width:206px;flex:0 0 206px;border-right:1px solid #eef1f5;padding-right:12px}' +
                        '.stag{display:inline-block;background:#b8935a;color:#fff;font-size:11px;font-weight:800;padding:2px 10px;border-radius:6px;letter-spacing:1px}' +
                        '.scode{font-size:26px;font-weight:900;color:#1d4ed8;margin-top:7px;line-height:1.15}' +
                        '.bdg{display:inline-block;font-size:11px;font-weight:800;padding:2px 8px;border-radius:6px;vertical-align:middle;margin-left:5px}' +
                        '.bdg.ko{background:#dc2626;color:#fff}.bdg.ki{background:#dc2626;color:#fff}' +
                        '.sname{font-size:13px;color:#64748b;font-weight:700;margin-bottom:8px}' +
                        '.sprices{width:100%;border-collapse:collapse;font-size:13px}' +
                        '.sprices td{padding:6px 4px;border-bottom:1px solid #f1f5f9;font-weight:700;color:#475569}' +
                        '.sprices td.v{text-align:right;font-weight:900;color:#0f2748;font-variant-numeric:tabular-nums}' +
                        '.sprices td.v.ko{color:#b8935a}.sprices td.v.ki{color:#dc2626}' +
                        '.schart{flex:1;min-width:0;display:flex;align-items:center}' +
                        '.ft{margin-top:14px;border-top:1px solid #e2e8f0;padding-top:8px;font-size:10.5px;color:#94a3b8;text-align:center;letter-spacing:.4px}' +
                        '</style></head><body>' +
                        '<div class="hd"><div class="t">FCN 部位報告<small>FIXED COUPON NOTE · POSITION REVIEW</small></div>' +
                        '<div class="meta"><b style="font-size:18px">' + (i.client || '') + '</b>　' + (i.sn || '') + '<br>業務：<b>' + (i.sales || '-') + '</b>　交割幣別：<b>' + (i.currency || '-') + '</b><br>報價日期：<b>' + dstr + '</b></div></div>' +
                        '<table class="cond"><thead><tr><th>下單日</th><th>天期(月)</th><th>到期日</th><th>出場價 KO</th><th>履約價 Strike</th><th>下限價 KI</th><th>Coupon(年化)</th></tr></thead><tbody>' +
                        '<tr><td>' + (i.date || '-') + '</td><td>' + months + '</td><td>' + (i.expiry || '-') + '</td><td class="hl">' + (i.koP || '-') + '%</td><td class="hl">' + (i.strikeP || '-') + '%</td><td class="hl">' + (i.kiP > 0 ? i.kiP + '%' : '無') + '</td><td class="hl">' + (i.coupon || '-') + '%</td></tr></tbody></table>' +
                        '<div class="legend"><span><i style="border-color:#1d4ed8;border-top-style:solid"></i>收盤價</span><span><i style="border-color:#b8935a;border-top-style:solid"></i>KO</span><span><i style="border-color:#64748b;border-top-style:dashed"></i>Strike</span><span><i style="border-color:#dc2626;border-top-style:dashed"></i>KI</span><span><i style="border-color:#7c3aed;border-top-style:dashed"></i>觀察起日</span><span><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:#e11d48;vertical-align:middle;margin-right:4px"></span>下單日</span></div>' +
                        rows +
                        '<div class="ft">◎ 本報告僅供內部參考，一切以實際成交狀況為主 ◎ 走勢為標的近 6 個月每日收盤價 ◎ KO／Strike／KI 為換算後之價格水準</div>' +
                        '<scr' + 'ipt>window.onload=function(){setTimeout(function(){window.print()},450)}<\/scr' + 'ipt></body></html>';
                },
                printCard() {
                    const w = window.open('', '_blank');
                    if (!w) { alert('請允許彈出視窗，才能開啟列印報告'); return; }
                    w.document.open(); w.document.write(this.buildPrintHTML(this.item)); w.document.close();
                },

                convTicker(raw) {
                    const s = String(raw == null ? '' : raw).trim();
                    if (!s) return '';
                    const p = s.split(/\s+/);
                    if (p.length >= 2) {
                        const mkt = p[p.length - 1].toUpperCase();
                        if (mkt === 'JP') return p[0] + '.T';
                        if (mkt === 'US') return p[0].toUpperCase();
                        return p[0].toUpperCase();
                    }
                    return s.toUpperCase();

                inventoryToCSV() {
                    const cols = ['branch','branchCode','account','idno','client','sn','isin','currency','coupon','koP','strikeP','kiP','tradeType','sales','koStart','date','expiry','amount','s1_code','s1_init','s2_code','s2_init','s3_code','s3_init','s4_code','s4_init','s5_code','s5_init'];
                    const esc = v => { if (v == null) return ''; const s = String(v); return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; };
                    const lines = [cols.join(',')];
                    this.inventory.forEach(it => {
                        const st = it.stocks || [];
                        const row = { branch:it.branch, branchCode:it.branchCode, account:it.account, idno:it.idno, client:it.client, sn:it.sn, isin:it.isin, currency:it.currency, coupon:it.coupon, koP:it.koP, strikeP:it.strikeP, kiP:it.kiP, tradeType:it.tradeType, sales:it.sales, koStart:it.koStart, date:it.date, expiry:it.expiry, amount:it.amount };
                        for (let i = 0; i < 5; i++) { row['s'+(i+1)+'_code'] = st[i] ? st[i].code : ''; row['s'+(i+1)+'_init'] = st[i] ? st[i].init : ''; }
                        lines.push(cols.map(c => esc(row[c])).join(','));
                    });
                    return lines.join('\n');
                },
                riskStatus(i) {
                    const parts = [];
                    try {
                        if (i.kiP > 0) {
                            const dl = this.parseDate(i.koStart || i.date);
                            if ((i.stocks || []).some(s => { const lo = this.getLowestSince(s, dl); return lo > 0 && lo <= (s.init * i.kiP / 100); })) parts.push('觸及KI');
                        }
                        if (!this.checkIsLocked(i)) {
                            const st = this.parseDate(i.koStart);
                            if ((i.stocks || []).some(s => { const hi = this.getHighestSince(s, st); return hi >= (s.init); })) parts.push('曾達KO');
                        }
                    } catch (e) {}
                    return parts.length ? parts.join('、') : '正常';
                },

                async fetchFX() {
                    // 即時匯率（免金鑰、支援 CORS）：USD 基準取 TWD/JPY，再算 JPY→TWD
                    try {
                        const r = await fetch('https://open.er-api.com/v6/latest/USD');
                        const j = await r.json();
                        const twd = j && j.rates && j.rates.TWD, jpy = j && j.rates && j.rates.JPY;
                        if (twd && jpy) {
                            this.fx = { usdTwd: twd, jpyTwd: twd / jpy, ok: true, at: new Date().toLocaleTimeString('zh-TW') };
                            return;
                        }
                    } catch (e) { /* 落到備援 */ }
                    // 備援：抓不到就用近似匯率（僅供估算，畫面會標示）
                    if (!this.fx.ok) this.fx = { usdTwd: 30, jpyTwd: 0.20, ok: false, at: '' };
                },
                async fetchRealPrices() {
                    if (this.inventory.length === 0) return;
                    this.isSyncing = true;
                    try {
                        const resp = await fetch('prices.json?v=' + Date.now());
                        if (!resp.ok) throw new Error('no prices.json');
                        const payload = await resp.json();
                        const prices = payload.prices || {};
                        if (!Object.keys(prices).length) throw new Error('empty prices.json');
                        this.inventory.forEach(item => {
                            (item.stocks || []).forEach(stock => {
                                const p = prices[stock.code];
                                if (p && p.current != null) {
                                    stock.current = p.current;
                                    stock.history = { timestamp: p.timestamp, high: p.high, low: p.low, close: p.close };
                                }
                            });
                        });
                        this.lastUpdated = new Date().toLocaleTimeString() + '（每日自動）';
                    } catch (e) {
                        // 後備：prices.json 尚未產生時，沿用原本的即時抓法
                        console.warn('prices.json 讀取失敗，改用即時抓取', e);
                        const symbols = [...new Set(this.inventory.flatMap(i => (i.stocks || []).map(s => s.code)))];
                        try {
                            await Promise.all(symbols.map(async (symbol) => {
                                try {
                                    const ysym = symbol.endsWith('.T') ? symbol : symbol.replace('.', '-');
                                    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ysym}?interval=1d&range=2y`;
                                    const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                                    const d = await r.json();
                                    const j = JSON.parse(d.contents);
                                    const res = j.chart.result[0];
                                    const cur = res.meta.regularMarketPrice;
                                    const hist = { timestamp: res.timestamp, high: res.indicators.quote[0].high, low: res.indicators.quote[0].low };
                                    if (cur) this.inventory.forEach(item => (item.stocks || []).forEach(stock => {
                                        if (stock.code === symbol) { stock.current = cur; stock.history = hist; }
                                    }));
                                } catch (err) { console.warn("Fail: " + symbol); }
                            }));
                            this.lastUpdated = new Date().toLocaleTimeString() + '（即時）';
                        } catch (e2) { console.error("ERR", e2); }
                    } finally {
                        this.isSyncing = false;
                    }
                }
            },
            mounted() {
                if (sessionStorage.getItem('fcn_auth') === 'true') this.isLoggedIn = true;
                this.loadCSVData();
                this.fetchFX();
                setInterval(() => this.fetchRealPrices(), 60000);
                setInterval(() => this.fetchFX(), 300000);
                window.addEventListener('beforeunload', (e) => {
                    if (this.dirty) { e.preventDefault(); e.returnValue = '你有尚未儲存的資料，確定要離開或重新整理嗎？'; }
                });
            }
        }).mount('#app')
    </script>
</body>
</html>
