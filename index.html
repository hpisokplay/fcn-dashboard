<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>上新莊分行 - FCN 管理系統 v58.FinalLogic</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [v-cloak] { display: none; }
        body { background-color: #f3f4f6; color: #1e293b; font-family: -apple-system, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif; -webkit-font-smoothing: antialiased; }
        .fcn-card { background: white; border-radius: 28px; padding: 24px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #eee; position: relative; }
        .stock-tag { background: #f8fafc; border: 1.5px solid #edf2f7; border-radius: 14px; padding: 10px 4px; text-align: center; flex: 1; min-width: 105px; position: relative; }

        /* 視覺標記樣式 */
        .stock-tag.ki-hit { border: 2px solid #ef4444; background-color: #fef2f2; } /* 紅色 KI */
        .stock-tag.ko-hit { border: 2px solid #3b82f6; background-color: #eff6ff; } /* 藍色 KO */

        .nav-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 8px; border-radius: 40px; display: flex; gap: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; overflow-x: auto; scrollbar-width: none; }
        .nav-btn { padding: 10px 16px; border-radius: 30px; font-weight: 800; color: #64748b; transition: 0.2s; white-space: nowrap; font-size: 13px; cursor: pointer; }
        .nav-btn.active { background: #1f2937; color: white; }
        .risk-tab { padding: 12px 14px; font-weight: 800; color: #94a3b8; border-bottom: 3px solid transparent; flex: 1; text-align: center; font-size: 11px; white-space: nowrap; cursor: pointer; }
        .risk-tab.active { color: #2563eb; border-bottom-color: #2563eb; background: rgba(37, 99, 235, 0.05); }
        .lock-badge { background: #fffbeb; color: #b45309; border: 1px solid #fef3c7; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
        .text-success { color: #10b981; font-weight: 900; }
        .text-danger { color: #ef4444; font-weight: 900; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .jpy-tag { color: #64748b; background: #f1f5f9; padding: 2px 6px; border-radius: 6px; font-weight: 900; }
        .usd-tag { color: #2563eb; background: #eff6ff; padding: 2px 6px; border-radius: 6px; font-weight: 900; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div id="app" v-cloak class="max-w-4xl mx-auto">
        <div v-if="!isLoggedIn" class="fixed inset-0 bg-slate-900 z-[2000] flex items-center justify-center p-6">
            <div class="bg-white rounded-[2.5rem] p-10 w-full max-w-sm text-center shadow-2xl">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white mx-auto mb-6"><i class="fa-solid fa-lock text-2xl"></i></div>
                <h2 class="text-2xl font-black mb-2 italic">上新莊管理系統</h2>
                <input v-model="inputPass" type="password" @keyup.enter="login" placeholder="Password" class="w-full bg-slate-100 border-none p-4 rounded-2xl text-center text-3xl tracking-[0.4em] mb-6 outline-none focus:ring-2 ring-blue-500 font-mono">
                <button @click="login" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black text-lg">LOGIN</button>
            </div>
        </div>

        <template v-if="isLoggedIn">
            <div class="nav-header sticky top-4 z-[1000] scrollbar-hide text-slate-800">
                <button @click="view = 'branch'" :class="['nav-btn', view === 'branch' ? 'active' : '']">資產管理</button>
                <button @click="view = 'client'" :class="['nav-btn', view === 'client' ? 'active' : '']">按客戶</button>
                <button @click="view = 'sales'" :class="['nav-btn', view === 'sales' ? 'active' : '']">按業務員</button>
                <button @click="view = 'alerts'" :class="['nav-btn', view === 'alerts' ? 'active' : '']">預警中心</button>
                <button @click="view = 'entry'" :class="['nav-btn', view === 'entry' ? 'active' : '']">資料輸入</button>
                <button @click="view = 'admin_panel'" :class="['nav-btn', view.includes('admin') ? 'active' : '']"><i class="fa-solid fa-gear text-lg"></i></button>
                <div class="ml-auto flex items-center pr-3">
                    <i @click="fetchRealPrices" class="fa-solid fa-rotate text-blue-500 cursor-pointer text-lg" :class="{'animate-spin': isSyncing}"></i>
                </div>
            </div>

            <div class="px-4 mb-4 flex justify-between items-center text-[10px] font-black italic tracking-widest text-gray-400 uppercase">
                <span class="flex items-center gap-1"><i class="fa-solid fa-circle text-[6px] text-green-500"></i> FCN Iron-Shield System</span>
                <span v-if="lastUpdated">Refreshed: {{ lastUpdated }}</span>
            </div>

            <div v-if="view === 'alerts'" class="space-y-4 fade-in">
                <div class="flex bg-white rounded-2xl shadow-sm mb-4 overflow-x-auto text-slate-800 scrollbar-hide border border-gray-100">
                    <button @click="alertTab = 'ki'" :class="['risk-tab', alertTab === 'ki' ? 'active' : '']">觸及KI({{kiList.length}})</button>
                    <button @click="alertTab = 'obs'" :class="['risk-tab', alertTab === 'obs' ? 'active' : '']">即將觀察({{observationList.length}})</button>
                    <button @click="alertTab = 'pko'" :class="['risk-tab', alertTab === 'pko' ? 'active' : '']">曾經KO({{partKOList.length}})</button>
                    <button @click="alertTab = 'nko'" :class="['risk-tab', alertTab === 'nko' ? 'active' : '']">即將KO({{nearKOList.length}})</button>
                    <button @click="alertTab = 'exp'" :class="['risk-tab', alertTab === 'exp' ? 'active' : '']">到期({{expiringList.length}})</button>
                    <button @click="alertTab = 'exit'" :class="['risk-tab', alertTab === 'exit' ? 'active' : '']">已出場({{exitList.length}})</button>
                </div>
                <div class="space-y-4">
                    <client-card v-for="item in currentAlertList" :item="item" :key="item.sn + item.client"></client-card>
                    <div v-if="currentAlertList.length === 0" class="text-center py-20 text-gray-300 font-bold italic uppercase text-xs tracking-widest">No Matches Found</div>
                </div>
            </div>

            <div v-if="view === 'branch'" class="space-y-4 fade-in">
                <h2 class="text-xl font-black px-2 italic uppercase text-slate-800 text-left tracking-tighter">Portfolio Summary</h2>
                <div v-for="curr in ['JPY', 'USD']" :key="curr" class="fcn-card shadow-xl text-white border-none" :class="curr==='JPY'?'bg-slate-800':'bg-blue-600'">
                    <div class="flex justify-between items-start mb-4 opacity-80 text-xs font-bold uppercase text-white font-black"><span>Portfolio size</span><span>{{ curr==='JPY'?countJPY:countUSD }}筆</span></div>
                    <div class="text-5xl font-black italic font-mono tracking-tighter text-white">{{ curr==='JPY'?'¥':'$' }} {{ formatNum(curr==='JPY'?totalJPY:totalUSD) }} <span class="text-lg font-normal opacity-50 uppercase text-white">萬</span></div>
                </div>
            </div>
            <div v-if="view === 'client'" class="space-y-4 fade-in"><input v-model="search" type="text" placeholder="🔍 Search Client or SN..." class="w-full p-4 rounded-3xl bg-white shadow-sm font-bold outline-none text-slate-800 pl-6"><client-card v-for="item in clientFilteredList" :item="item" :key="item.sn + item.client"></client-card></div>
            <div v-if="view === 'sales'" class="space-y-4 fade-in text-slate-800 text-left"><select v-model="selectedSales" class="w-full p-4 rounded-3xl bg-white shadow-sm font-black text-blue-600 outline-none text-lg text-slate-800 font-mono"><option v-for="s in salesSummary" :value="s.name">{{ s.name }} ({{ s.count }} 筆)</option></select><client-card v-for="item in salesFilteredList" :item="item" :key="item.sn + item.client"></client-card></div>

            <div v-if="view === 'entry'" class="space-y-4 fade-in text-slate-800 text-left">
                <div class="fcn-card">
                    <h2 class="text-xl font-black italic mb-4">{{ editIndex===null ? '➕ 新增部位' : '✏️ 編輯部位' }}</h2>
                    <div class="grid grid-cols-2 gap-3 text-sm">
                        <label class="block font-bold text-gray-500">客戶<input v-model="form.client" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                        <label class="block font-bold text-gray-500">SN<input v-model="form.sn" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                        <label class="block font-bold text-gray-500">業務員<input v-model="form.sales" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                        <label class="block font-bold text-gray-500">幣別<select v-model="form.currency" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"><option>USD</option><option>JPY</option></select></label>
                        <label class="block font-bold text-gray-500">票息 %<input type="number" step="0.01" v-model.number="form.coupon" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                        <label class="block font-bold text-gray-500">庫存金額(萬)<input type="number" v-model.number="form.amount" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                        <label class="block font-bold text-gray-500">KO %<input type="number" step="0.01" v-model.number="form.koP" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                        <label class="block font-bold text-gray-500">KI %<input type="number" step="0.01" v-model.number="form.kiP" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                        <label class="block font-bold text-gray-500">PUT/履約 %<input type="number" step="0.01" v-model.number="form.strikeP" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                        <label class="block font-bold text-gray-500">觀察起日<input type="date" v-model="form.koStart" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                        <label class="block font-bold text-gray-500">下單日<input type="date" v-model="form.date" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                        <label class="block font-bold text-gray-500">到期日<input type="date" v-model="form.expiry" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                    </div>
                    <h3 class="font-black mt-5 mb-2 text-gray-500 text-sm">標的（最多 5 檔・日股代號記得加 .T，例 7974.T）</h3>
                    <div class="space-y-2">
                        <div v-for="(st,idx) in form.stocks" :key="idx" class="flex gap-2 items-center">
                            <input v-model="st.code" placeholder="代號" class="flex-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-blue-600 uppercase">
                            <input type="number" step="0.01" v-model.number="st.init" placeholder="KO價" class="flex-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800">
                            <button @click="form.stocks.splice(idx,1)" class="text-red-500 font-black px-2">✕</button>
                        </div>
                        <button v-if="form.stocks.length<5" @click="form.stocks.push({code:'',init:null})" class="text-blue-600 font-black text-sm">＋ 加一檔標的</button>
                    </div>
                    <div class="flex gap-2 mt-6">
                        <button @click="submitEntry" class="flex-1 bg-slate-900 text-white p-3.5 rounded-2xl font-black">{{ editIndex===null ? '新增到列表' : '更新' }}</button>
                        <button v-if="editIndex!==null" @click="resetForm" class="bg-gray-200 text-gray-600 px-6 rounded-2xl font-black">取消</button>
                    </div>
                </div>

                <div class="fcn-card">
                    <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
                        <h3 class="font-black text-slate-800">目前資料（{{ inventory.length }} 筆）<span v-if="dirty" class="text-red-500 text-xs ml-1 align-middle">● 尚未儲存</span></h3>
                        <div class="flex gap-2 items-center flex-wrap">
                            <input ref="importInput" type="file" accept=".xlsx,.xls,.csv" @change="importFile" class="hidden">
                            <button @click="triggerImport" class="bg-indigo-600 text-white px-4 py-2 rounded-xl font-black text-sm">📥 匯入客戶表</button>
                            <input ref="masterInput" type="file" accept=".xlsx,.xls,.csv" @change="importMaster" class="hidden">
                            <button @click="triggerMaster" class="bg-purple-600 text-white px-4 py-2 rounded-xl font-black text-sm">📥 匯入商品主檔(補標的)</button>
                            <button @click="exportOriginal" class="bg-emerald-600 text-white px-4 py-2 rounded-xl font-black text-sm">📤 匯出(原表)</button>
                            <button @click="exportExcel" class="bg-teal-600 text-white px-4 py-2 rounded-xl font-black text-sm">📊 匯出(含現價)</button>
                            <button @click="downloadCSV" class="bg-slate-600 text-white px-4 py-2 rounded-xl font-black text-sm">⬇️ 下載備份</button>
                            <input v-model="githubToken" type="password" placeholder="GitHub Token" class="text-xs bg-gray-100 p-2 rounded-lg w-36 font-mono outline-none">
                            <button @click="saveAllToGithub" :disabled="isUploading" :class="['px-4 py-2 rounded-xl font-black text-sm text-white', dirty ? 'bg-blue-600 animate-pulse' : 'bg-blue-600']">{{ isUploading ? '處理中…' : '💾 儲存到 GitHub' }}</button>
                            <button @click="runPriceSchedule" :disabled="isUploading" class="bg-orange-500 text-white px-4 py-2 rounded-xl font-black text-sm">🔄 報價排程(抓2年歷史)</button>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <div v-for="(it,idx) in inventory" :key="idx" class="flex justify-between items-center bg-gray-50 p-3 rounded-2xl">
                            <div class="min-w-0"><b class="text-slate-800">{{ it.client }}</b> <span class="text-[11px] text-gray-400 font-bold">{{ it.sn }} · {{ (it.stocks||[]).map(s=>s.code).join('、') }}</span></div>
                            <div class="flex gap-3 flex-shrink-0">
                                <button @click="editEntry(idx)" class="text-blue-600 text-sm font-black">編輯</button>
                                <button @click="deleteEntry(idx)" class="text-red-500 text-sm font-black">刪除</button>
                            </div>
                        </div>
                        <div v-if="inventory.length===0" class="text-center text-gray-300 py-8 font-bold italic text-xs uppercase">No Data</div>
                    </div>
                    <p class="text-[11px] text-gray-400 mt-4 leading-relaxed">＊ 新增/編輯/刪除後，要按上面「💾 儲存到 GitHub」才會永久保存。第一次要貼一次 GitHub Token（會記在這台裝置）。</p>
                </div>
            </div>

            <div v-if="view === 'admin_login'" class="fade-in max-w-sm mx-auto mt-10 text-center"><div class="fcn-card text-slate-800 text-center"><h3 class="font-black mb-4 text-gray-400 uppercase italic text-xs tracking-widest text-slate-800">Admin Security</h3><input v-model="adminPassInput" type="password" @keyup.enter="checkAdminPass" class="w-full p-4 rounded-2xl bg-gray-100 mb-4 text-center font-mono outline-none border-2 focus:border-blue-500 text-slate-800 shadow-sm"><button @click="checkAdminPass" class="w-full bg-slate-800 text-white p-4 rounded-2xl font-black text-white shadow-lg">VERIFY</button></div></div>
            <div v-if="view === 'admin_panel'" class="fade-in space-y-4 text-center text-slate-800 max-w-sm mx-auto"><div class="fcn-card text-slate-800 text-left"><h2 class="text-xl font-black italic mb-6 text-center">CSV DATA SYNC</h2><div class="space-y-6 text-slate-800 font-mono"><input v-model="githubToken" type="password" placeholder="Token" class="w-full bg-gray-50 p-3 rounded-xl border-none font-mono text-center text-sm text-slate-800"><div class="border-4 border-dashed rounded-[2rem] p-10 cursor-pointer hover:bg-gray-50 text-slate-800 text-center"><input type="file" id="csvFile" @change="handleFileUpload" class="hidden text-slate-800"><label for="csvFile" class="block font-black text-gray-500 cursor-pointer">Choose data.csv</label></div><button @click="uploadToGithub" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black shadow-xl uppercase text-white">Sync GitHub</button></div></div></div>
        </template>
    </div>

    <script>
        const { createApp } = Vue
        const stockNames = {'6146.T':'Disco','6501.T':'日立','7011.T':'三菱重工','6857.T':'愛德萬','7012.T':'川崎重工','7013.T':'IHI重工','7974.T':'任天堂','8035.T':'東京威力','5803.T':'藤倉電子','8697.T':'日本交易所','8002.T':'丸紅','NVDA':'輝達','TSLA':'特斯拉','TSM':'台積電','AMD':'超微','MU':'美光','ARM':'安謀','GOOG':'谷歌','AMZN':'亞馬遜','AVGO':'博通','MSFT':'微軟','META':'臉書','DELL':'戴爾','ORCL':'甲骨文','OKLO':'Oklo','PLTR':'帕蘭提爾','NFLX':'網飛','BRK.B':'波克夏'};

        const ClientCard = {
            props: ['item'],
            template: `
                <div class="fcn-card fade-in text-slate-800 border border-gray-100 shadow-sm text-left">
                    <div v-if="isLocked(item)" class="absolute right-6 top-4"><span class="lock-badge"><i class="fa-solid fa-lock mr-1"></i>保證鎖定期</span></div>
                    <div class="flex justify-between items-start mb-6">
                        <div class="text-left text-slate-800">
                            <h3 class="text-3xl font-black text-gray-800 tracking-tighter italic leading-none">{{ item.client }}</h3>
                            <div class="flex items-center gap-1 mt-2 font-bold text-[10px] text-gray-400 uppercase tracking-widest text-slate-800">{{ item.sn }} <span :class="[item.currency === 'JPY' ? 'jpy-tag' : 'usd-tag']">{{ item.currency }}</span></div>
                        </div>
                        <div class="text-right">
                            <div class="bg-indigo-50 text-indigo-600 text-[10px] px-2 py-1 rounded-lg font-black italic tracking-tighter text-center px-2 uppercase">票息: {{ item.coupon }}%</div>
                            <div class="text-[9px] text-gray-400 font-bold mt-1 uppercase text-right tracking-tighter">業務: {{ item.sales }}</div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-6 text-slate-800">
                        <div v-for="s in (item.stocks || [])" :key="s.code" class="stock-tag" :class="getStockClass(item, s)">
                            <!-- 觸及KI 標籤 -->
                            <div v-if="isStockKI(item, s)" class="absolute -top-3 right-0 bg-red-600 text-white text-[9px] px-2 py-0.5 rounded-full font-bold shadow-sm z-10">⚠ 觸及KI</div>
                            <!-- 曾經KO 標籤 -->
                            <div v-if="isStockKO(item, s)" class="absolute -top-3 right-0 bg-blue-600 text-white text-[9px] px-2 py-0.5 rounded-full font-bold shadow-sm z-10">★ 曾達KO</div>

                            <p class="text-[11px] font-black text-blue-500 leading-none uppercase">{{ s.code.replace('.T', '') }}</p>
                            <p class="text-[9px] font-bold text-gray-400 mb-1 h-5 overflow-hidden text-ellipsis">{{ getStockName(s.code) }}</p>
                            <p class="text-xl font-black leading-none my-1 tracking-tighter text-slate-800">{{ formatPrice(s.current) }}</p>
                            <div class="text-[8px] font-bold text-gray-400 border-t border-gray-50 pt-1 mt-1 leading-tight">
                                <p>KO: <span class="text-slate-800 font-black">{{ formatPrice(s.init) }}</span></p>
                                <p>KI: <span class="text-slate-800 font-black">{{ item.kiP > 0 ? formatPrice(s.init * (item.kiP/100)) : 'None' }}</span></p>
                            </div>
                            <p class="text-[11px] font-black mt-1" :class="perfColor(item, s)">{{ getPerf(item, s) }}%</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 border-t border-gray-100 pt-5 mb-4 text-[11px] font-bold text-gray-500">
                        <div class="space-y-1 text-left text-slate-800">
                            <p>下單日期: <span class="text-slate-900 font-black italic">{{ item.date || '---' }}</span></p>
                            <p>庫存金額: <span class="text-slate-900 font-black italic">{{ (!item.amount) ? '交割中' : formatNum(item.amount) + ' 萬' }}</span></p>
                            <p>到期日期: <span class="text-blue-500 font-black italic">{{ item.expiry }}</span></p>
                        </div>
                        <div class="text-right space-y-1">
                            <p>月利率: {{ (item.coupon/12).toFixed(4) }}%</p>
                            <p>預估月息: <span class="text-emerald-600 font-black text-xl italic text-right">{{ item.currency==='JPY'?'¥':'$' }}{{ formatNum(calcMonthly(item)) }}</span></p>
                        </div>
                    </div>
                    <div class="flex justify-between items-center text-[9px] font-black bg-gray-50 p-3 rounded-2xl text-gray-400 uppercase tracking-widest italic">
                        <span>KO: <span class="text-slate-800 font-black">{{ item.koP }}%</span></span><span>PUT: <span class="text-slate-800 font-black">{{ item.strikeP }}%</span></span><span :class="{'text-danger underline': hasBreachedKI(item)}">KI: {{ item.kiP }}%</span><span>START: <span class="text-slate-800 font-black text-right">{{ item.koStart }}</span></span>
                    </div>
                </div>
            `,
            methods: {
                formatNum(n){ return n ? Math.floor(n).toLocaleString() : '0'; },
                formatPrice(n){
                    if (!n || n == 0) return '---';
                    return (Math.floor(parseFloat(n) * 100) / 100).toFixed(2);

                    } catch(e) { return false; }
                },
                checkIsLocked(i) {
                    if(!i.koStart) return false;
                    try {
                        return new Date() < this.parseDate(i.koStart);
                    } catch(e) { return false; }
                },
                parseDate(str) {
                    if(!str) return new Date();
                    return new Date(String(str).replace(/-/g, '/').trim());
                },
                getLowestSince(stock, startDate) {
                    let minP = stock.current;

                        for (let j = 0; j < stock.history.timestamp.length; j++) {
                            if (stock.history.timestamp[j] >= startTs) {
                                const low = (stock.history.close || stock.history.low)[j];
                                if (low !== null && low < minP) minP = low;

                        }
                    }
                    return minP;

                            if (stock.history.timestamp[j] >= startTs) {
                                const high = (stock.history.close || stock.history.high)[j];
                                if (high !== null && high > maxP) maxP = high;
                            }
                        }
                    }
                    return maxP;
                }
            }
        };

                    if (/^\d+(\.\d+)?$/.test(s)) { const d = new Date(Math.round((+s - 25569) * 86400 * 1000)); if (!isNaN(d)) return this.toISO(d); }

                    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'FCN客戶表');
                    const d = new Date();
                    XLSX.writeFile(wb, `FCN客戶表_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.xlsx`);
                },
                inventoryToCSV() {
                    const cols = ['branch','branchCode','account','idno','client','sn','isin','currency','coupon','koP','strikeP','kiP','tradeType','sales','koStart','date','expiry','amount','s1_code','s1_init','s2_code','s2_init','s3_code','s3_init','s4_code','s4_init','s5_code','s5_init'];
                    const esc = v => { if (v == null) return ''; const s = String(v); return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; };
                    const lines = [cols.join(',')];
                    this.inventory.forEach(it => {
                        const st = it.stocks || [];
                        const row = { branch:it.branch, branchCode:it.branchCode, account:it.account, idno:it.idno, client:it.client, sn:it.sn, isin:it.isin, currency:it.currency, coupon:it.coupon, koP:it.koP, strikeP:it.strikeP, kiP:it.kiP, tradeType:it.tradeType, sales:it.sales, koStart:it.koStart, date:it.date, expiry:it.expiry, amount:it.amount };
                        for (let i = 0; i < 5; i++) { row['s'+(i+1)+'_code'] = st[i] ? st[i].code : ''; row['s'+(i+1)+'_init'] = st[i] ? st[i].init : ''; }
                        lines.push(cols.map(c => esc(row[c])).join(','));
                    });
                    return lines.join('\n');
                },
                riskStatus(i) {
                    const parts = [];
                    try {
                        if (i.kiP > 0) {
                            const dl = this.parseDate(i.date);
                            if ((i.stocks || []).some(s => { const lo = this.getLowestSince(s, dl); return lo > 0 && lo <= (s.init * i.kiP / 100); })) parts.push('觸及KI');
                        }
                        if (!this.checkIsLocked(i)) {
                            const st = this.parseDate(i.koStart);
                            if ((i.stocks || []).some(s => { const hi = this.getHighestSince(s, st); return hi >= (s.init); })) parts.push('曾達KO');
                        }
                    } catch (e) {}
                    return parts.length ? parts.join('、') : '正常';
                },
                exportExcel() {
                    if (typeof XLSX === 'undefined') { alert('Excel 元件尚未載入完成，請稍候再試一次'); return; }
                    if (!this.inventory.length) { alert('目前沒有資料可匯出'); return; }
                    const perf = s => (s.init && s.current) ? Math.round((s.current / s.init) * 10000) / 100 : '';
                    const rows = this.inventory.map(it => {
                        const st = it.stocks || [];
                        const row = {
                            '客戶': it.client, 'SN': it.sn, '業務員': it.sales, '幣別': it.currency,
                            '票息(%)': it.coupon, '庫存金額(萬)': it.amount,
                            '月利率(%)': (it.coupon != null) ? Math.round((it.coupon / 12) * 10000) / 10000 : '',
                            '下單日': it.date, '觀察起日': it.koStart, '到期日': it.expiry,
                            'KO(%)': it.koP, 'KI(%)': it.kiP, 'PUT(%)': it.strikeP,
                        };
                        for (let i = 0; i < 5; i++) {
                            const s = st[i];
                            row['標的' + (i+1)] = s ? s.code : '';
                            row['期初' + (i+1)] = s ? s.init : '';
                            row['現價' + (i+1)] = s ? s.current : '';
                            row['表現' + (i+1) + '(%)'] = s ? perf(s) : '';
                        }
                        row['風險狀態'] = this.riskStatus(it);
                        return row;
                    });
                    const ws = XLSX.utils.json_to_sheet(rows);
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, ws, 'FCN部位');
                    const d = new Date();
                    const ymd = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
                    XLSX.writeFile(wb, `FCN部位_${ymd}.xlsx`);
                },
                async runPriceSchedule() {
                    if (!this.githubToken) { alert('請先貼上 GitHub Token（跟儲存用的同一個）'); return; }
                    if (!this.inventory.length) { alert('目前沒有資料，請先匯入客戶表與商品主檔。'); return; }
                    if (!confirm('會先儲存目前資料，再啟動報價排程，去抓「表單中所有美股+日股」的 2 年收盤歷史。\n\n確定執行？')) return;
                    this.isUploading = true;
                    try {
                        const owner = 'hpisokplay', repo = 'fcn-dashboard';
                        localStorage.setItem('fcn_token', this.githubToken);
                        // 1) 先存 data.csv，讓排程看得到所有標的代號
                        const content = btoa(unescape(encodeURIComponent(this.inventoryToCSV())));
                        let sha;
                        const g = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/data.csv`, { headers: { 'Authorization': `token ${this.githubToken}` } });
                        if (g.ok) sha = (await g.json()).sha;
                        const pr = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/data.csv`, {
                            method: 'PUT', headers: { 'Authorization': `token ${this.githubToken}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message: 'data.csv before price run', content, sha })
                        });
                        if (!pr.ok) { const e = await pr.json().catch(() => ({})); alert('儲存資料失敗，無法啟動排程：' + (e.message || pr.status)); this.isUploading = false; return; }
                        this.dirty = false;
                        // 2) 觸發報價 workflow
                        const d = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/workflows/prices.yml/dispatches`, {
                            method: 'POST', headers: { 'Authorization': `token ${this.githubToken}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
                            body: JSON.stringify({ ref: 'main' })
                        });
                        if (d.status === 204) alert('✅ 報價排程已啟動！\n正在抓取所有標的（美股+日股）的 2 年收盤歷史，約 1–3 分鐘。\n完成後重新整理網頁即可。');
                        else { const e = await d.json().catch(() => ({})); alert('排程啟動失敗：' + (e.message || d.status) + '\n（資料已存好，也可到 GitHub Actions 手動 Run workflow）'); }
                    } catch (e) { alert('錯誤：' + e.message); } finally { this.isUploading = false; }
                },
                async saveAllToGithub() {
                    if (!this.githubToken) { alert('請先貼上 GitHub Token'); return; }
                    this.isUploading = true;
                    try {
                        const owner = 'hpisokplay', repo = 'fcn-dashboard', path = 'data.csv';
                        localStorage.setItem('fcn_token', this.githubToken);
                        const csv = this.inventoryToCSV();
                        const content = btoa(unescape(encodeURIComponent(csv)));
                        let sha;
                        const g = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, { headers: { 'Authorization': `token ${this.githubToken}` } });
                        if (g.ok) { const gd = await g.json(); sha = gd.sha; }
                        const pr = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                            method: 'PUT', headers: { 'Authorization': `token ${this.githubToken}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message: 'Update data.csv (web entry)', content, sha })
                        });
                        if (pr.ok) { this.dirty = false; alert('已儲存到 GitHub！約 1 分鐘後生效。'); }
                        else { const e = await pr.json().catch(() => ({})); alert('儲存失敗：' + (e.message || pr.status)); }
                    } catch (e) { alert('錯誤：' + e.message); } finally { this.isUploading = false; }
                },
                async uploadToGithub() {
                    this.isUploading = true;
                    try {
                        const owner='hpisokplay', repo='fcn-dashboard', path='data.csv';
                        const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {headers:{'Authorization':`token ${this.githubToken}`}});
                        const fd = await res.json();
                        const r = new FileReader();
                        r.onload = async (e) => {
                            const c = e.target.result.split(',')[1];
                            const pr = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                                method:'PUT', headers:{'Authorization':`token ${this.githubToken}`,'Content-Type':'application/json'},
                                body: JSON.stringify({message:'Web Update', content:c, sha:fd.sha})
                            });
                            if(pr.ok){ alert('SUCCESS'); location.reload(); }
                        };
                        r.readAsDataURL(this.selectedFile);
                    } catch(e){ alert('Error'); } finally { this.isUploading=false; }
                },
                async loadCSVData() {
                    this.isSyncing = true;
                    try {
                        const response = await fetch('data.csv?v=' + Date.now());
                        const csvText = await response.text();
                        Papa.parse(csvText, {
                            header: true, dynamicTyping: false, skipEmptyLines: true,
                            transformHeader: h => h.trim().replace(/^﻿/, ""),
                            complete: (results) => {
                                const n = this.n;
                                this.inventory = results.data.map(row => {
                                    const stocks = [];
                                    for(let i=1; i<=5; i++) if(row[`s${i}_code`]) stocks.push({
                                        code: String(row[`s${i}_code`]).trim(),
                                        init: n(row[`s${i}_init`]),
                                        current: n(row[`s${i}_init`]),
                                        history: null
                                    });
                                    return {
                                        ...row,
                                        client: row.client ? String(row.client).trim() : '',
                                        sn: row.sn ? String(row.sn).trim() : '',
                                        coupon: n(row.coupon), koP: n(row.koP), kiP: n(row.kiP), strikeP: n(row.strikeP), amount: n(row.amount),
                                        stocks: stocks
                                    };
                                });
                                this.dirty = false;
                                this.fetchRealPrices();
                            }
                        });
                    } catch (e) { console.error("CSV ERR"); } finally { this.isSyncing = false; }
                },
                async fetchRealPrices() {
                    if (this.inventory.length === 0) return;
                    this.isSyncing = true;
                    try {
                        const resp = await fetch('prices.json?v=' + Date.now());
                        if (!resp.ok) throw new Error('no prices.json');
                        const payload = await resp.json();
                        const prices = payload.prices || {};
                        if (!Object.keys(prices).length) throw new Error('empty prices.json');
                        this.inventory.forEach(item => {
                            (item.stocks || []).forEach(stock => {
                                const p = prices[stock.code];
                                if (p && p.current != null) {
                                    stock.current = p.current;
                                    stock.history = { timestamp: p.timestamp, high: p.high, low: p.low, close: p.close };
                                }
                            });
                        });
                        this.lastUpdated = new Date().toLocaleTimeString() + '（每日自動）';
                    } catch (e) {
                        // 後備：prices.json 尚未產生時，沿用原本的即時抓法
                        console.warn('prices.json 讀取失敗，改用即時抓取', e);
                        const symbols = [...new Set(this.inventory.flatMap(i => (i.stocks || []).map(s => s.code)))];
                        try {
                            await Promise.all(symbols.map(async (symbol) => {
                                try {
                                    const ysym = symbol.endsWith('.T') ? symbol : symbol.replace('.', '-');
                                    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ysym}?interval=1d&range=2y`;
                                    const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                                    const d = await r.json();
                                    const j = JSON.parse(d.contents);
                                    const res = j.chart.result[0];
                                    const cur = res.meta.regularMarketPrice;
                                    const hist = { timestamp: res.timestamp, high: res.indicators.quote[0].high, low: res.indicators.quote[0].low };
                                    if (cur) this.inventory.forEach(item => (item.stocks || []).forEach(stock => {
                                        if (stock.code === symbol) { stock.current = cur; stock.history = hist; }
                                    }));
                                } catch (err) { console.warn("Fail: " + symbol); }
                            }));
                            this.lastUpdated = new Date().toLocaleTimeString() + '（即時）';
                        } catch (e2) { console.error("ERR", e2); }
                    } finally {
                        this.isSyncing = false;
                    }
                }
            },
            mounted() {
                if (sessionStorage.getItem('fcn_auth') === 'true') this.isLoggedIn = true;
                this.loadCSVData();
                setInterval(() => this.fetchRealPrices(), 60000);
                window.addEventListener('beforeunload', (e) => {
                    if (this.dirty) { e.preventDefault(); e.returnValue = '你有尚未儲存的資料，確定要離開或重新整理嗎？'; }
                });
            }
        }).mount('#app')
    </script>
</body>
