name: 更新美股／日股報價

on:
  schedule:
    # ── 上班前更新：確保台北 07:30 前完成（美股＋日股皆為最新已收盤價）──
    # 兩個時間點雙保險，避免 GitHub 排程偶爾延遲/略過
    # UTC 21:30 = 台北 05:30（對應台北 週一～週五 早上）
    - cron: "30 21 * * 0-4"
    # UTC 22:00 = 台北 06:00（對應台北 週一～週五 早上）
    - cron: "0 22 * * 0-4"
    # ── 盤後即時更新：當日日股收盤後 ──
    # UTC 07:00 = 台北 15:00（週一～週五下午）
    - cron: "0 7 * * 1-5"
  workflow_dispatch: {}   # 允許在 Actions 分頁手動按「Run workflow」

permissions:
  contents: write

jobs:
  prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 抓取報價
        run: python3 scripts/fetch_prices.py

      - name: 提交更新
        run: |
          git config user.name "price-bot"
          git config user.email "actions@github.com"
          git add prices.json
          git diff --cached --quiet && echo "無變更" || git commit -m "prices: $(date -u +'%Y-%m-%d %H:%M') UTC 自動更新"
          git push
